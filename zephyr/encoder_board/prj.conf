CONFIG_GPIO=y
CONFIG_SHELL=y


# =========== cdc-acm-console.conf =============

CONFIG_USB_DEVICE_STACK_NEXT=y
# CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# ================= Network =====================

# General config
CONFIG_REQUIRES_FULL_LIBC=y

# Networking config
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# Network driver config
CONFIG_TEST_RANDOM_GENERATOR=y

# Network address config
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"

# Networking tweaks
# Required to handle large number of consecutive connections, e.g. when testing with ApacheBench.
CONFIG_NET_TCP_TIME_WAIT_DELAY=0


# This was to solve compile-time warnings. Might work without.
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_INIT_PRIO=95
CONFIG_NET_CONFIG_NEED_IPV4=y

# Shell
CONFIG_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_NET_STATISTICS=y


# =============== Ehternet USBD ====================

CONFIG_NET_L2_ETHERNET=y


CONFIG_NET_ARP=y
CONFIG_NET_ARP_TABLE_SIZE=2
CONFIG_NET_ARP_GRATUITOUS=y


CONFIG_UDC_DRIVER=y
CONFIG_UDC_BUF_COUNT=16
CONFIG_UDC_BUF_POOL_SIZE=1024
CONFIG_UDC_DRIVER_LOG_LEVEL_DEFAULT=y
# CONFIG_UDC_STM32_STACK_SIZE=1024
CONFIG_UDC_DRIVER_HIGH_SPEED_SUPPORT_ENABLED=n

CONFIG_USB_DEVICE_STACK_NEXT=y

CONFIG_USBD_LOG_LEVEL_DEFAULT=y
CONFIG_USBD_MAX_SPEED_FULL=y
CONFIG_USBD_BOS_SUPPORT=y
CONFIG_USBD_VREQ_SUPPORT=y
CONFIG_USBD_SHELL=y
CONFIG_USBD_THREAD_STACK_SIZE=1024
CONFIG_USBD_MAX_UDC_MSG=10
CONFIG_USBD_MSG_DEFERRED_MODE=y
CONFIG_USBD_MSG_SLAB_COUNT=8
CONFIG_USBD_MSG_WORK_DELAY=1
CONFIG_USBD_HWINFO_DEVID_LENGTH=16
CONFIG_USBD_CDC_NCM_CLASS=y
CONFIG_USBD_CDC_NCM_MAX_DGRAM_PER_NTB=2

CONFIG_USBD_CDC_NCM_LOG_LEVEL_DEFAULT=y

# To avoid stack overflow.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_USBD_THREAD_STACK_SIZE=4096
